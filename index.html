<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="D-lookbook">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">
    <title>D-lookbook</title>
    <link href="dist/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #171717; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 2px; }
        html { scroll-behavior: smooth; }

        * { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* ===== Dress Card ===== */
        .dress-card {
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .dress-card img {
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .dress-card:hover img {
            transform: scale(1.04);
        }
        .dress-card .card-info {
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform: translateY(10px);
        }
        .dress-card:hover .card-info {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== Filter Buttons ===== */
        .filter-btn {
            position: relative;
            transition: color 0.3s ease;
        }
        .filter-btn::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            width: 0;
            height: 1px;
            background: white;
            transition: width 0.3s ease, left 0.3s ease;
        }
        .filter-btn.active::after {
            width: 100%;
            left: 0;
        }
        .filter-btn:hover::after {
            width: 100%;
            left: 0;
        }

        /* ===== Grid Filter Animation ===== */
        .dress-card {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* ===== Fullscreen Slideshow ===== */
        .slideshow-overlay {
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        .slide-image {
            transition: opacity 3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        transform 3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .slide-image.entering {
            opacity: 0;
            transform: scale(1.02);
        }
        .slide-image.active {
            opacity: 1;
            transform: scale(1);
        }
        .slide-image.exiting {
            transition: opacity 2s ease, transform 2s ease !important;
            opacity: 0;
            transform: scale(0.98);
        }

        /* Thumbnail strip */
        .thumb-strip {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .thumb-strip::-webkit-scrollbar { display: none; }

        .thumb-item {
            transition: opacity 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
            flex-shrink: 0;
        }
        .thumb-item.active {
            border-color: white !important;
            opacity: 1 !important;
        }
        .thumb-item:not(.active) {
            opacity: 0.4;
        }
        .thumb-item:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        /* Progress bar */
        .progress-bar {
            transition: width 0.3s ease;
        }

        /* Slide counter */
        .slide-counter {
            font-variant-numeric: tabular-nums;
        }

        /* Fade in for page load */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        .fade-in-1 { animation-delay: 0.5s; }
        .fade-in-2 { animation-delay: 1.5s; }
        .fade-in-3 { animation-delay: 3s; }

        /* Auto-play indicator */
        @keyframes autoplayPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .autoplay-active {
            animation: autoplayPulse 2s ease-in-out infinite;
        }

        /* Ken Burns subtle effect */
        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        .ken-burns {
            animation: kenBurns 8s ease-in-out alternate infinite;
        }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white antialiased min-h-screen">

    <!-- Background Music -->
    <audio id="bgMusic" src="music/esmeralda.mp3" loop preload="auto"></audio>

    <!-- Splash Screen -->
    <div id="splashScreen" class="fixed inset-0 z-50 bg-[#0a0a0a] flex flex-col items-center justify-center cursor-pointer" onclick="dismissSplash()">
        <p id="splashLogo" class="font-serif text-4xl md:text-6xl tracking-[0.2em] text-white mb-6 fade-in fade-in-1">D-LOOKBOOK</p>
        <p class="text-[10px] tracking-[0.5em] uppercase text-[#525252] mb-16 fade-in fade-in-2">Dress Collection</p>
        <div class="fade-in fade-in-3 flex flex-col items-center gap-3">
            <div class="w-px h-8 bg-white/20"></div>
            <p class="text-[10px] tracking-[0.4em] uppercase text-[#404040]">Touch to enter</p>
        </div>
    </div>

    <!-- Music Toggle Button -->
    <button id="musicToggle" onclick="toggleMusic()" class="fixed bottom-5 right-5 z-40 w-10 h-10 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition-all">
        <svg id="musicIconOn" class="w-4 h-4 text-white/50" fill="currentColor" viewBox="0 0 24 24">
            <path d="M9 18V5l12-2v13M9 18c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-2c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
        </svg>
        <svg id="musicIconOff" class="w-4 h-4 text-white/20 hidden" fill="currentColor" viewBox="0 0 24 24">
            <path d="M9 18V5l12-2v13M9 18c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-2c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM1 1l22 22"/>
        </svg>
    </button>

    <!-- ===== Top Bar (minimal) ===== -->
    <header class="fixed top-0 left-0 right-0 z-30 bg-[#0a0a0a]/80 backdrop-blur-md border-b border-[#262626]/50">
        <div class="max-w-[1600px] mx-auto px-6 md:px-10 flex items-center justify-between h-16">
            <span id="headerLogo" class="font-serif text-xl tracking-wider">D-LOOKBOOK</span>
            <span class="text-[10px] tracking-[0.4em] uppercase text-[#737373]">Dress Collection</span>
        </div>
    </header>

    <!-- ===== Main Grid View ===== -->
    <main id="gridView" class="pt-24 pb-16 px-4 md:px-8 lg:px-12 max-w-[1600px] mx-auto">

        <!-- Category Filters -->
        <div class="flex items-center justify-center gap-6 md:gap-10 mb-12 fade-in fade-in-1">
            <button class="filter-btn active text-[11px] tracking-[0.3em] uppercase text-white pb-1" data-filter="all">All</button>
            <button class="filter-btn text-[11px] tracking-[0.3em] uppercase text-[#737373] pb-1" data-filter="wedding">Wedding</button>
            <button class="filter-btn text-[11px] tracking-[0.3em] uppercase text-[#737373] pb-1" data-filter="evening">Evening</button>
            <button class="filter-btn text-[11px] tracking-[0.3em] uppercase text-[#737373] pb-1" data-filter="cocktail">Cocktail</button>
            <button class="filter-btn text-[11px] tracking-[0.3em] uppercase text-[#737373] pb-1" data-filter="classic">Classic</button>
        </div>

        <!-- Dress Grid -->
        <div id="dressGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4 fade-in fade-in-2">
            <div id="loadingMsg" class="col-span-4 text-center py-20 text-[11px] tracking-[0.3em] uppercase text-[#333]">Loading...</div>
        </div>

        <!-- Item count -->
        <div class="text-center mt-10 fade-in fade-in-3">
            <p id="itemCount" class="text-[11px] tracking-[0.3em] uppercase text-[#525252]"></p>
        </div>
    </main>

    <!-- ===== Fullscreen Slideshow ===== -->
    <div id="slideshow" class="fixed inset-0 z-50 hidden slideshow-overlay bg-[#0a0a0a]/97">

        <!-- Close & Back -->
        <button id="ssClose" class="absolute top-5 right-5 z-20 w-11 h-11 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors">
            <svg class="w-5 h-5 text-white/70" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>

        <!-- Dress name & info (top) -->
        <div class="absolute top-5 left-5 md:left-10 z-20">
            <h2 id="ssDressName" class="font-serif text-lg md:text-2xl tracking-wide"></h2>
            <p id="ssDressStyle" class="text-[10px] tracking-[0.3em] uppercase text-[#737373] mt-1"></p>
        </div>

        <!-- Main Image Area -->
        <div class="absolute inset-0 flex items-center justify-center px-4 md:px-20 pt-20 pb-36">
            <div id="ssImageContainer" class="relative w-full h-full flex items-center justify-center">
                <img id="ssMainImage" src="" alt="" class="slide-image active max-w-full max-h-full object-contain">
            </div>
        </div>

        <!-- Nav arrows -->
        <button id="ssPrev" class="absolute left-3 md:left-6 top-1/2 -translate-y-1/2 z-20 w-12 h-12 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors group">
            <svg class="w-5 h-5 text-white/50 group-hover:text-white transition-colors" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        <button id="ssNext" class="absolute right-3 md:right-6 top-1/2 -translate-y-1/2 z-20 w-12 h-12 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors group">
            <svg class="w-5 h-5 text-white/50 group-hover:text-white transition-colors" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
            </svg>
        </button>

        <!-- Bottom Panel: Thumbnails + Controls -->
        <div class="absolute bottom-0 left-0 right-0 z-20 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a]/80 to-transparent pt-16 pb-6 px-4 md:px-10">

            <!-- Progress bar -->
            <div class="w-full max-w-md mx-auto h-px bg-[#262626] mb-5 rounded-full overflow-hidden">
                <div id="ssProgress" class="progress-bar h-full bg-white/60 rounded-full" style="width: 0%"></div>
            </div>

            <!-- Thumbnail strip -->
            <div class="flex justify-center mb-4">
                <div id="ssThumbStrip" class="thumb-strip flex gap-2 md:gap-3 overflow-x-auto px-4 max-w-4xl">
                </div>
            </div>

            <!-- Counter + Autoplay -->
            <div class="flex items-center justify-center gap-6">
                <span id="ssCounter" class="slide-counter text-[11px] tracking-[0.2em] text-[#737373]"></span>
                <button id="ssAutoplay" class="text-[10px] tracking-[0.3em] uppercase text-[#525252] hover:text-white transition-colors flex items-center gap-2">
                    <span id="ssPlayIcon" class="w-3 h-3 border border-current rounded-full flex items-center justify-center">
                        <svg class="w-1.5 h-1.5 ml-px" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                    </span>
                    <span id="ssPlayLabel">Auto</span>
                </button>
            </div>
        </div>
    </div>

    <script>
    // ============================
    // SUPABASE
    // ============================
    const SUPABASE_URL = 'https://cdqstqlpaihvexbmjdfd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkcXN0cWxwYWlodmV4Ym1qZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDQ1NDQsImV4cCI6MjA4OTIyMDU0NH0.4c-ROHG1Qy0s5JPHuBgPpOxbE_j1EljDDswBlTe7NaM';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let dresses = [];

    // ============================
    // BUILD GRID
    // ============================
    const grid = document.getElementById('dressGrid');
    const itemCountEl = document.getElementById('itemCount');

    function buildGrid(filter = 'all') {
        const filtered = filter === 'all' ? dresses : dresses.filter(d => d.category === filter);

        grid.innerHTML = '';
        filtered.forEach((dress, i) => {
            const card = document.createElement('div');
            card.className = 'dress-card aspect-[3/4] bg-[#171717] rounded-sm overflow-hidden';
            card.dataset.dressId = dress.id;
            card.style.animationDelay = `${i * 0.06}s`;
            card.innerHTML = `
                <div class="relative w-full h-full">
                    <img src="${dress.thumbnail}" alt="${dress.name}"
                         class="w-full h-full object-cover grayscale" loading="lazy">
                    <div class="card-info absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent flex flex-col justify-end p-4 md:p-5">
                        <p class="text-[9px] tracking-[0.3em] uppercase text-[#a3a3a3] mb-1">${dress.style}</p>
                        <h3 class="font-serif text-sm md:text-base tracking-wide">${dress.name}</h3>
                        <div class="flex items-center gap-1.5 mt-2 text-[9px] tracking-[0.2em] uppercase text-[#737373]">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91"/>
                            </svg>
                            ${dress.images.length} views
                        </div>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => openSlideshow(dress));
            grid.appendChild(card);
        });

        itemCountEl.textContent = `Showing ${filtered.length} of ${dresses.length} dresses`;
    }

    // ============================
    // LOAD FROM SUPABASE
    // ============================
    async function loadDressesFromDB() {
        // 현재 도메인과 일치하는 매장 찾기
        const hostname = window.location.hostname;
        const { data: shops } = await sb.from('shops').select('*');

        let shopId = null;
        if (shops?.length) {
            const matched = shops.find(s => {
                if (!s.domain) return false;
                try {
                    const h = new URL(s.domain.includes('://') ? s.domain : 'https://' + s.domain).hostname;
                    return h === hostname;
                } catch { return s.domain.includes(hostname); }
            });
            if (matched) {
                shopId = matched.id;
                const shopName = matched.name.toUpperCase();
                document.getElementById('splashLogo').textContent = shopName;
                document.getElementById('headerLogo').textContent = shopName;
                document.title = matched.name + ' — Dress Collection';

                // PWA manifest 동적 교체 (설치 시 매장 이름 반영)
                const manifestBlob = new Blob([JSON.stringify({
                    name: matched.name + ' Dress Collection',
                    short_name: matched.name,
                    display: 'fullscreen',
                    display_override: ['fullscreen', 'standalone'],
                    background_color: '#0a0a0a',
                    theme_color: '#0a0a0a',
                    start_url: '/',
                    icons: [
                        { src: 'icons/icon-192.svg', sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable' },
                        { src: 'icons/icon-512.svg', sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
                    ]
                })], { type: 'application/json' });
                document.querySelector('link[rel="manifest"]').href = URL.createObjectURL(manifestBlob);

                // iOS 홈화면 이름 동적 교체
                document.querySelector('meta[name="apple-mobile-web-app-title"]').content = matched.name;
            }
        }

        // 드레스 불러오기
        let dressQuery = sb.from('dresses').select('*').order('created_at');
        if (shopId) dressQuery = dressQuery.eq('shop_id', shopId);
        const { data: dressData } = await dressQuery;

        if (!dressData?.length) {
            document.getElementById('loadingMsg').textContent = '등록된 드레스가 없어요';
            return;
        }

        // 이미지 한 번에 불러오기
        const ids = dressData.map(d => d.id);
        const { data: imgData } = await sb.from('dress_images').select('*').in('dress_id', ids).order('order');

        dresses = dressData.map(d => {
            const imgs = (imgData || []).filter(img => img.dress_id === d.id).sort((a, b) => a.order - b.order);
            const thumb = imgs.find(img => img.is_thumbnail)?.url || imgs[0]?.url || '';
            return { id: d.id, name: d.name, style: d.style, category: d.category, thumbnail: thumb, images: imgs.map(i => i.url) };
        }).filter(d => d.images.length > 0);

        const msg = document.getElementById('loadingMsg');
        if (msg) msg.remove();
        buildGrid();
    }

    loadDressesFromDB();

    // ============================
    // CATEGORY FILTERING
    // ============================
    const filterBtns = document.querySelectorAll('.filter-btn');

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => {
                b.classList.remove('active', 'text-white');
                b.classList.add('text-[#737373]');
            });
            btn.classList.add('active', 'text-white');
            btn.classList.remove('text-[#737373]');

            // Fade out
            grid.style.opacity = '0';
            grid.style.transform = 'translateY(10px)';
            grid.style.transition = 'opacity 0.3s ease, transform 0.3s ease';

            setTimeout(() => {
                buildGrid(btn.dataset.filter);
                // Fade in
                requestAnimationFrame(() => {
                    grid.style.opacity = '1';
                    grid.style.transform = 'translateY(0)';
                });
            }, 300);
        });
    });

    // ============================
    // SLIDESHOW
    // ============================
    const slideshow = document.getElementById('slideshow');
    const ssMainImage = document.getElementById('ssMainImage');
    const ssDressName = document.getElementById('ssDressName');
    const ssDressStyle = document.getElementById('ssDressStyle');
    const ssThumbStrip = document.getElementById('ssThumbStrip');
    const ssCounter = document.getElementById('ssCounter');
    const ssProgress = document.getElementById('ssProgress');
    const ssClose = document.getElementById('ssClose');
    const ssPrev = document.getElementById('ssPrev');
    const ssNext = document.getElementById('ssNext');
    const ssAutoplay = document.getElementById('ssAutoplay');
    const ssPlayLabel = document.getElementById('ssPlayLabel');
    const ssPlayIcon = document.getElementById('ssPlayIcon');

    let currentDress = null;
    let currentSlide = 0;
    let autoplayTimer = null;
    let isAutoplay = false;

    function openSlideshow(dress) {
        currentDress = dress;
        currentSlide = 0;
        isAutoplay = false;
        clearInterval(autoplayTimer);

        ssDressName.textContent = dress.name;
        ssDressStyle.textContent = dress.style;

        // Build thumbnail strip
        ssThumbStrip.innerHTML = '';
        dress.images.forEach((img, i) => {
            const thumb = document.createElement('div');
            thumb.className = `thumb-item w-12 h-16 md:w-14 md:h-20 rounded-sm overflow-hidden border-2 border-transparent cursor-pointer ${i === 0 ? 'active' : ''}`;
            thumb.innerHTML = `<img src="${img}" alt="View ${i+1}" class="w-full h-full object-cover grayscale">`;
            thumb.addEventListener('click', () => goToSlide(i));
            ssThumbStrip.appendChild(thumb);
        });

        updateSlide(false);
        slideshow.classList.remove('hidden');
        document.body.style.overflow = 'hidden';

        // 전체화면
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else if (document.documentElement.webkitRequestFullscreen) {
            document.documentElement.webkitRequestFullscreen();
        }

        // Preload all images
        dress.images.forEach(src => {
            const img = new Image();
            img.src = src;
        });
    }

    function goToSlide(index) {
        if (index === currentSlide) return;
        currentSlide = index;
        updateSlide(true);
    }

    function updateSlide(animate = true) {
        if (!currentDress) return;
        const images = currentDress.images;

        if (animate) {
            ssMainImage.classList.remove('active');
            ssMainImage.classList.add('exiting');

            setTimeout(() => {
                ssMainImage.src = images[currentSlide];
                ssMainImage.classList.remove('exiting');
                ssMainImage.classList.add('entering');

                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        ssMainImage.classList.remove('entering');
                        ssMainImage.classList.add('active');
                    });
                });
            }, 1000);
        } else {
            ssMainImage.src = images[currentSlide];
            ssMainImage.classList.add('active');
        }

        // Update counter
        ssCounter.textContent = `${String(currentSlide + 1).padStart(2, '0')} / ${String(images.length).padStart(2, '0')}`;

        // Update progress
        ssProgress.style.width = `${((currentSlide + 1) / images.length) * 100}%`;

        // Update thumbnails
        const thumbs = ssThumbStrip.querySelectorAll('.thumb-item');
        thumbs.forEach((t, i) => {
            t.classList.toggle('active', i === currentSlide);
        });

        // Scroll active thumb into view
        const activeThumb = thumbs[currentSlide];
        if (activeThumb) {
            activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    }

    function nextSlide() {
        if (!currentDress) return;
        currentSlide = (currentSlide + 1) % currentDress.images.length;
        updateSlide(true);
    }

    function prevSlide() {
        if (!currentDress) return;
        currentSlide = (currentSlide - 1 + currentDress.images.length) % currentDress.images.length;
        updateSlide(true);
    }

    function closeSlideshow() {
        slideshow.classList.add('hidden');
        document.body.style.overflow = '';
        clearInterval(autoplayTimer);
        isAutoplay = false;
        updateAutoplayUI();

        // 전체화면 해제
        if (document.exitFullscreen && document.fullscreenElement) {
            document.exitFullscreen().catch(() => {});
        } else if (document.webkitExitFullscreen && document.webkitFullscreenElement) {
            document.webkitExitFullscreen();
        }
    }

    function toggleAutoplay() {
        isAutoplay = !isAutoplay;
        if (isAutoplay) {
            nextSlide();
            autoplayTimer = setInterval(nextSlide, 7000);
        } else {
            clearInterval(autoplayTimer);
        }
        updateAutoplayUI();
    }

    function updateAutoplayUI() {
        if (isAutoplay) {
            ssPlayLabel.textContent = 'Pause';
            ssPlayIcon.classList.add('autoplay-active');
            ssPlayIcon.innerHTML = `<svg class="w-1.5 h-1.5" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
        } else {
            ssPlayLabel.textContent = 'Auto';
            ssPlayIcon.classList.remove('autoplay-active');
            ssPlayIcon.innerHTML = `<svg class="w-1.5 h-1.5 ml-px" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>`;
        }
    }

    // Event listeners
    ssClose.addEventListener('click', closeSlideshow);
    ssPrev.addEventListener('click', prevSlide);
    ssNext.addEventListener('click', nextSlide);
    ssAutoplay.addEventListener('click', toggleAutoplay);

    // Keyboard
    document.addEventListener('keydown', (e) => {
        if (slideshow.classList.contains('hidden')) return;
        if (e.key === 'Escape') closeSlideshow();
        if (e.key === 'ArrowLeft') prevSlide();
        if (e.key === 'ArrowRight') nextSlide();
        if (e.key === ' ') { e.preventDefault(); toggleAutoplay(); }
    });

    // Touch swipe (tablet) - 부드러운 스와이프
    let touchStartX = 0;
    let touchCurrentX = 0;
    let isSwiping = false;

    slideshow.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].clientX;
        touchCurrentX = touchStartX;
        isSwiping = true;
        ssMainImage.style.transition = 'none';
    }, { passive: true });

    slideshow.addEventListener('touchmove', (e) => {
        if (!isSwiping) return;
        touchCurrentX = e.changedTouches[0].clientX;
        const diff = touchCurrentX - touchStartX;
        ssMainImage.style.transform = `translateX(${diff * 0.4}px) scale(1)`;
    }, { passive: true });

    slideshow.addEventListener('touchend', (e) => {
        if (!isSwiping) return;
        isSwiping = false;
        ssMainImage.style.transition = '';
        ssMainImage.style.transform = '';
        const diff = touchStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 60) {
            diff > 0 ? nextSlide() : prevSlide();
        }
    }, { passive: true });

    // Click on backdrop to close
    slideshow.addEventListener('click', (e) => {
        if (e.target === slideshow) closeSlideshow();
    });

    // ============================
    // BACKGROUND MUSIC
    // ============================
    const bgMusic = document.getElementById('bgMusic');
    const musicIconOn = document.getElementById('musicIconOn');
    const musicIconOff = document.getElementById('musicIconOff');
    let musicPlaying = false;

    function toggleMusic() {
        if (musicPlaying) {
            bgMusic.pause();
            musicIconOn.classList.add('hidden');
            musicIconOff.classList.remove('hidden');
            musicPlaying = false;
        } else {
            bgMusic.play();
            musicIconOn.classList.remove('hidden');
            musicIconOff.classList.add('hidden');
            musicPlaying = true;
        }
    }

    function dismissSplash() {
        const splash = document.getElementById('splashScreen');
        splash.style.transition = 'opacity 1.5s ease';
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 800);

        bgMusic.play().then(() => {
            musicPlaying = true;
            musicIconOn.classList.remove('hidden');
            musicIconOff.classList.add('hidden');
        }).catch(() => {});
    }

    </script>
</body>
</html>
